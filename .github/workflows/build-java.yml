name: Build Test and Deploy Java app to S3

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write   # REQUIRED for OIDC
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build and Test
      run: mvn clean verify

    - name: Package JAR
      run: mvn package

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v7.1.0 # Ex: v4.1.0 or sha1, See the latest version at https://github.com/marketplace/actions/official-sonarqube-scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        projectBaseDir: src
        args: >
          -Dsonar.organization=ac-itsolutions2025
          "-Dsonar.projectName=Java Sample Project"
          -Dsonar.projectKey=java-sample-project
          -Dsonar.java.binaries=target/classes
      

    - name: Configure AWS Credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::124355683348:role/github-action-oidc-s3-upload
        aws-region: us-east-1

    - name: Upload to S3
      run: |
        aws s3 cp target/*.jar s3://github-actions-build-artifact/
